# ============================================
# 物种知识库 - Docker Compose 配置
# 服务: MySQL + Backend + Frontend
# 服务器: 2核2G 优化版
# ============================================
version: "3.8"

# ============================================
# 网络 - 服务间内部通信
# ============================================
networks:
  species-network:
    driver: bridge

# ============================================
# 数据卷 - 持久化存储
# ============================================
volumes:
  mysql-data:
    driver: local
  uploads-data:
    driver: local

# ============================================
# 服务定义
# ============================================
services:

  # ---------- MySQL 8.0 ----------
  mysql:
    image: mysql:8.0
    container_name: species-mysql
    restart: unless-stopped
    networks:
      - species-network
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      MYSQL_ROOT_PASSWORD: Species@2024
      TZ: Asia/Shanghai
    command:
      # 关键优化: 限制 MySQL 内存使用
      - "--innodb_buffer_pool_size=256M"
      - "--innodb_log_buffer_size=16M"
      - "--max_connections=50"
      - "--thread_cache_size=8"
      - "--skip-name-resolve"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pSpecies@2024"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------- Spring Boot 后端 ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: species-backend
    restart: unless-stopped
    networks:
      - species-network
    ports:
      - "8081:8081"
    volumes:
      # 持久化上传的图片
      - uploads-data:/root/species-uploads
    environment:
      # 激活生产环境配置
      SPRING_PROFILES_ACTIVE: prod
      # JVM 内存限制
      JAVA_OPTS: "-Xmx256m -Xms128m -XX:+UseSerialGC -Djava.security.egd=file:/dev/./urandom"
      # 数据库连接 (mysql = docker-compose 服务名)
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/species?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Species@2024
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ---------- Nginx 前端 ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: species-frontend
    restart: unless-stopped
    networks:
      - species-network
    ports:
      - "80:80"
    volumes:
      # 挂载上传目录到 nginx 根目录下，由 location / 自动服务
      - uploads-data:/usr/share/nginx/html/uploads
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
